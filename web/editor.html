<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom mb-4">
  <div class="container">
    <a class="navbar-brand" href="index.html">WasmPosts</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="posts.html">Posts</a>
      <a class="nav-link active" href="editor.html">New Post</a>
      <a class="nav-link" href="users.html">Users</a>
    </div>
    <div id="auth-bar"></div>
  </div>
</nav>

<main class="container">
  <div id="login-prompt" class="alert alert-info" style="display:none;">
    Please sign in with Google to create or edit posts.
  </div>

  <div id="permission-denied" class="alert alert-warning" style="display:none;">
    Your role does not allow creating posts. Ask an admin to assign you the <strong>editor</strong> or <strong>admin</strong> role.
  </div>

  <section id="post-editor" style="display:none;">
    <h2 id="editor-heading">New Post</h2>
    <form id="post-form" autocomplete="off">
      <input type="hidden" id="post-id" value="" />

      <div class="mb-3">
        <label for="post-title" class="form-label">Title</label>
        <input type="text" class="form-control" id="post-title" required maxlength="200" />
      </div>

      <div class="mb-3">
        <label for="post-content" class="form-label">Content</label>
        <textarea class="form-control" id="post-content" rows="10" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="btn-submit">Publish</button>
      <button type="button" class="btn btn-secondary" id="btn-cancel" style="display:none;">Cancel</button>
      <span id="editor-status" class="ms-2 text-success" style="display:none;">Saved!</span>
    </form>
  </section>

  <hr class="my-4" />
  <h3>Your Posts</h3>
  <div id="posts-list">
    <p class="text-muted">Loading&hellip;</p>
  </div>
</main>

<script type="module">
  import "./js/app.js";
  import "./js/ui.js";

  document.addEventListener("DOMContentLoaded", async () => {
    await WasmApp.init();
    UI.renderAuthBar("auth-bar");

    const session = WasmApp.getSession();

    if (!session || !session.logged_in) {
      document.getElementById("login-prompt").style.display = "block";
    } else if (session.role === "viewer") {
      document.getElementById("permission-denied").style.display = "block";
    } else {
      document.getElementById("post-editor").style.display = "block";
    }

    UI.renderPostsList("posts-list");

    // Form handling
    const form = document.getElementById("post-form");
    const idField = document.getElementById("post-id");
    const titleField = document.getElementById("post-title");
    const contentField = document.getElementById("post-content");
    const heading = document.getElementById("editor-heading");
    const cancelBtn = document.getElementById("btn-cancel");
    const status = document.getElementById("editor-status");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = titleField.value.trim();
      const content = contentField.value.trim();
      if (!title || !content) return;

      let result;
      if (idField.value) {
        result = WasmApp.updatePost(idField.value, title, content);
      } else {
        result = WasmApp.createPost(title, content);
      }

      if (result && result.error) {
        alert(result.error);
        return;
      }

      // Show success
      status.style.display = "inline";
      setTimeout(() => (status.style.display = "none"), 2000);

      // Reset form
      idField.value = "";
      titleField.value = "";
      contentField.value = "";
      heading.textContent = "New Post";
      cancelBtn.style.display = "none";

      // Re-render list
      UI.renderPostsList("posts-list");
    });

    cancelBtn.addEventListener("click", () => {
      idField.value = "";
      titleField.value = "";
      contentField.value = "";
      heading.textContent = "New Post";
      cancelBtn.style.display = "none";
    });

    // Show cancel when editing
    WasmApp.onSessionChange(() => {
      const s = WasmApp.getSession();
      if (!s || !s.logged_in) {
        document.getElementById("post-editor").style.display = "none";
        document.getElementById("login-prompt").style.display = "block";
      }
    });
  });
</script>

</body>
</html>
