# Cloud Build pipeline for Hartzog.ai
# Mirrors the GitHub Actions workflow but deploys to Cloud Storage.
#
# Trigger this from Cloud Build console or via cloudbuild.tf Terraform resource.
# Requires: _BUCKET_NAME substitution variable set to your website bucket name.

steps:
  # Install dependencies
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['ci']

  # Build the Astro site
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Sync built files to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-d'
      - '-c'                    # Compare checksums, not timestamps
      - 'dist/'
      - 'gs://${_BUCKET_NAME}/'

  # Set cache headers for static assets
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:public, max-age=31536000, immutable'
      - 'gs://${_BUCKET_NAME}/_astro/**'

  # Set shorter cache for HTML files
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'setmeta'
      - '-h'
      - 'Cache-Control:public, max-age=3600, must-revalidate'
      - 'gs://${_BUCKET_NAME}/**/*.html'

  # Invalidate CDN cache
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'url-maps'
      - 'invalidate-cdn-cache'
      - 'hartzog-ai-urlmap-${_ENVIRONMENT}'
      - '--path'
      - '/*'
      - '--async'

substitutions:
  _BUCKET_NAME: 'hartzog-ai-website-prod'
  _ENVIRONMENT: 'prod'

options:
  logging: CLOUD_LOGGING_ONLY
