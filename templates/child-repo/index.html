<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Name | Hartzog.ai</title>
  <meta name="description" content="Project description here." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Project Name | Hartzog.ai" />
  <meta property="og:description" content="Project description here." />
  <meta property="og:site_name" content="Hartzog.ai" />

  <!-- Shared Hartzog.ai theme (served via jsDelivr CDN from the main repo) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/base.css" />

  <!-- Web Components -->
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/nav-bar.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/footer.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/cta-banner.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/newsletter.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/contact-form.js" defer></script>

  <!-- Google Fonts (same as main site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Project-specific styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Navigation — automatically links back to Hartzog.ai and shows sibling projects -->
  <hartzog-nav parent="https://www.hartzog.dev"></hartzog-nav>

  <main class="hz-container" style="padding: 2.5rem 1.5rem; flex: 1;">
    <h1>Project Name</h1>
    <p style="color: var(--hz-text-muted); margin-bottom: 2rem; max-width: 60ch;">
      Your project description here.
    </p>

    <!-- WASM container for Rust output -->
    <div id="wasm-app" style="
      background: var(--hz-bg-secondary);
      border: 1px solid var(--hz-border);
      border-radius: var(--hz-radius);
      min-height: 400px;
      padding: 1rem;
      margin-bottom: 2rem;
    ">
      <!-- Rust/WASM renders here -->
    </div>

    <!-- CTA banner linking back to main site services -->
    <hartzog-cta
      heading="Need help with your data?"
      text="Hartzog.ai offers data analysis, AI solutions, and consulting."
      button-text="View Services"
      button-url="https://www.hartzog.dev/services">
    </hartzog-cta>

    <!-- Newsletter signup -->
    <div style="max-width: 500px; margin: 2rem auto;">
      <hartzog-newsletter
        form-id="YOUR_FORMSPREE_ID"
        heading="Stay Updated"
        text="Get notified about new projects and analysis.">
      </hartzog-newsletter>
    </div>
  </main>

  <!-- Full footer with nav links back to main site -->
  <hartzog-footer parent="https://www.hartzog.dev"></hartzog-footer>

  <!-- D3.js (load from CDN) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Your WASM module (generated by wasm-pack) -->
  <!-- <script type="module">
    import init from './pkg/your_project.js';
    await init();
  </script> -->
</body>
</html>
