<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Name | Hartzog.ai</title>

  <!-- Shared Hartzog.ai theme (served via jsDelivr CDN from the main repo) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/base.css" />
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/nav-bar.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/timothyhartzog/timothyhartzog.github.io@main/src/theme/footer.js" defer></script>

  <!-- Google Fonts (same as main site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation — automatically links back to Hartzog.ai and shows sibling projects -->
  <hartzog-nav parent="https://www.hartzog.ai"></hartzog-nav>

  <main class="hz-container" style="padding: 2.5rem 1.5rem; flex: 1;">
    <h1>Project Name</h1>
    <p style="color: var(--hz-text-muted); margin-bottom: 2rem;">
      Your project description here.
    </p>

    <!-- WASM container for Rust output -->
    <div id="wasm-app" style="
      background: var(--hz-bg-secondary);
      border: 1px solid var(--hz-border);
      border-radius: var(--hz-radius);
      min-height: 400px;
      padding: 1rem;
    ">
      <!-- Rust/WASM renders here -->
    </div>
  </main>

  <hartzog-footer parent="https://www.hartzog.ai"></hartzog-footer>

  <!-- D3.js (load from CDN) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Your WASM module (generated by wasm-pack) -->
  <!-- <script type="module">
    import init from './pkg/your_project.js';
    await init();
  </script> -->
</body>
</html>
