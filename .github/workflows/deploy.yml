name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # GCP deployment — uncomment when ready to dual-deploy
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}
      #
      # - name: Deploy to Cloud Storage
      #   uses: google-github-actions/upload-cloud-storage@v2
      #   with:
      #     path: dist
      #     destination: ${{ vars.GCP_BUCKET_NAME }}
      #     process_gcloudignore: false
      #
      # - name: Set cache headers on static assets
      #   run: |
      #     gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
      #       "gs://${{ vars.GCP_BUCKET_NAME }}/_astro/**"
      #     gsutil -m setmeta -h "Cache-Control:public, max-age=3600, must-revalidate" \
      #       "gs://${{ vars.GCP_BUCKET_NAME }}/**/*.html"
      #
      # - name: Invalidate CDN cache
      #   run: |
      #     gcloud compute url-maps invalidate-cdn-cache \
      #       hartzog-ai-urlmap-prod --path "/*" --async

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
