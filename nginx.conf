# nginx.conf — hartzog.dev main site (static HTML)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Standard static site routing
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block"               always;

    # Long-term cache for versioned static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML — always serve fresh
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
